<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMD Strix Halo Context Bench</title>
    <meta
      name="description"
      content="GitHub Pages benchmark table for AMD Strix Halo llama.cpp context scaling results."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="panel hero">
        <div class="hero-copy">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p class="hero-lead" id="hero-lead"></p>
          <div class="hero-badges" id="hero-badges"></div>
        </div>
        <div class="hero-actions">
          <div class="language-switch" aria-label="Language selector">
            <button type="button" class="language-button" data-lang="en">EN</button>
            <button type="button" class="language-button" data-lang="ko">KR</button>
          </div>
          <a class="action-link" id="repo-link" target="_blank" rel="noreferrer">GitHub</a>
          <a class="action-link" id="readme-link" target="_blank" rel="noreferrer">README</a>
          <a class="action-link" id="csv-link" href="./benchmark_results.csv">CSV</a>
        </div>
      </header>

      <section class="stats-grid" id="stats-grid"></section>

      <section class="panel controls-panel">
        <div class="controls-top controls-top--single">
          <label class="control-field">
            <span class="control-label" id="search-label"></span>
            <input id="search-input" type="search" autocomplete="off" />
          </label>

          <label class="control-field control-field--compact">
            <span class="control-label" id="sort-label"></span>
            <select id="sort-select"></select>
          </label>
        </div>
      </section>

      <section class="table-card">
        <div class="section-head section-head--tight">
          <div>
            <p class="eyebrow" id="table-eyebrow"></p>
            <h2 id="table-title"></h2>
          </div>
          <p class="section-copy" id="table-summary"></p>
        </div>
        <p class="table-note" id="table-note"></p>
        <div class="table-wrap">
          <table class="summary-table">
            <thead>
              <tr>
                <th id="summary-head-model"></th>
                <th id="summary-head-zero-decode"></th>
                <th id="summary-head-zero-prefill"></th>
                <th id="summary-head-max-context"></th>
                <th id="summary-head-max-decode"></th>
                <th id="summary-head-max-prefill"></th>
              </tr>
            </thead>
            <tbody id="summary-body"></tbody>
          </table>
        </div>
        <div class="empty-state" id="empty-state" hidden></div>
      </section>

      <section class="info-grid">
        <section class="panel info-card" id="system-card"></section>
        <section class="panel info-card" id="publish-card"></section>
      </section>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
