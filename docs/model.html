<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Detail</title>
    <meta
      name="description"
      content="Per-model decode and prefill context scaling charts with raw benchmark rows."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="panel hero detail-hero">
        <div class="hero-copy">
          <a class="back-link" id="back-link" href="./index.html">Back</a>
          <p class="eyebrow" id="detail-eyebrow"></p>
          <h1 id="detail-title"></h1>
          <p class="hero-lead" id="detail-lead"></p>
          <div class="hero-badges" id="detail-badges"></div>
        </div>
        <div class="hero-actions hero-actions--stacked">
          <div class="language-switch" aria-label="Language selector">
            <button type="button" class="language-button" data-lang="en">
              EN
            </button>
            <button type="button" class="language-button" data-lang="ko">
              KR
            </button>
          </div>
          <a class="action-link" id="repo-link" target="_blank" rel="noreferrer"
            >GitHub</a
          >
          <a
            class="action-link"
            id="readme-link"
            target="_blank"
            rel="noreferrer"
            >README</a
          >
          <a class="action-link" id="csv-link" href="./benchmark_results.csv"
            >CSV</a
          >
        </div>
      </header>

      <section class="panel detail-panel">
        <div id="detail-content" hidden>
          <div
            class="detail-stat-grid detail-stat-grid--wide"
            id="detail-stat-grid"
          ></div>

          <div class="charts-grid">
            <section class="chart-card">
              <div class="section-head section-head--tight">
                <div>
                  <h3 id="decode-title"></h3>
                  <p class="section-copy" id="decode-subtitle"></p>
                </div>
              </div>
              <div class="chart-wrap">
                <svg
                  id="decode-chart-svg"
                  viewBox="0 0 760 360"
                  preserveAspectRatio="none"
                >
                  <title>Decode chart</title>
                </svg>
              </div>
            </section>

            <section class="chart-card">
              <div class="section-head section-head--tight">
                <div>
                  <h3 id="prefill-title"></h3>
                  <p class="section-copy" id="prefill-subtitle"></p>
                </div>
              </div>
              <div class="chart-wrap">
                <svg
                  id="prefill-chart-svg"
                  viewBox="0 0 760 360"
                  preserveAspectRatio="none"
                >
                  <title>Prefill chart</title>
                </svg>
              </div>
            </section>
          </div>

          <section class="table-card detail-table-card">
            <div class="section-head section-head--tight">
              <div>
                <p class="eyebrow" id="raw-eyebrow"></p>
                <h3 id="raw-title"></h3>
              </div>
              <p class="section-copy" id="raw-subtitle"></p>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th id="raw-head-context"></th>
                    <th id="raw-head-phase"></th>
                    <th id="raw-head-status"></th>
                    <th id="raw-head-decode"></th>
                    <th id="raw-head-prefill"></th>
                    <th id="raw-head-below"></th>
                    <th id="raw-head-elapsed"></th>
                    <th id="raw-head-date"></th>
                  </tr>
                </thead>
                <tbody id="raw-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </div>

    <script type="module" src="model.js"></script>
  </body>
</html>
